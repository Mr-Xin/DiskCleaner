<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DiskFlow · Hi-fi Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="hifi.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #07090d; overflow: hidden; }
    #root { width: 100%; height: 100%; }
    /* design canvas styles get overridden where they affect the warm canvas bg.
       Keep the canvas dark to suit the design. */
    body { background: #0a0d14 !important; }
    /* DesignCanvas section titles need to be light on dark */
    [class*='dc-'] [contenteditable] { color: var(--t-1) !important; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="hifi-shared.jsx"></script>
  <script type="text/babel" src="hifi-dashboard.jsx"></script>
  <script type="text/babel" src="hifi-smart-cleanup.jsx"></script>
  <script type="text/babel" src="hifi-screens-1.jsx"></script>
  <script type="text/babel" src="hifi-screens-2.jsx"></script>

  <script type="text/babel">
    // Standard mac desktop window dimensions for the artboards
    const W = 1280, H = 800;

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="primary" title="01 · 主要屏幕" subtitle="用户 90% 的时间会停留在这四屏。">
            <DCArtboard id="dashboard" label="仪表盘 · 总览" width={W} height={H}>
              <HiFiDashboard />
            </DCArtboard>
            <DCArtboard id="smart-cleanup" label="智能清理中心 · “查看全部”跳转目标 ✨" width={W} height={H}>
              <HiFiSmartCleanup />
            </DCArtboard>
            <DCArtboard id="analyzer" label="存储分析 · 旭日图钻取" width={W} height={H}>
              <HiFiAnalyzer />
            </DCArtboard>
            <DCArtboard id="large-files" label="大文件查找 · 表格 + 预览" width={W} height={H}>
              <HiFiLargeFiles />
            </DCArtboard>
            <DCArtboard id="duplicates" label="重复文件清理 · 左右对照" width={W} height={H}>
              <HiFiDuplicates />
            </DCArtboard>
          </DCSection>

          <DCSection id="secondary" title="02 · 次要屏幕" subtitle="内存监控、应用卸载、设置。">
            <DCArtboard id="memory" label="内存监控 · 实时 RAM + 进程" width={W} height={H}>
              <HiFiMemory />
            </DCArtboard>
            <DCArtboard id="apps" label="应用卸载 · 网格 + 残留数据" width={W} height={H}>
              <HiFiApps />
            </DCArtboard>
            <DCArtboard id="settings" label="设置" width={W} height={H}>
              <HiFiSettings />
            </DCArtboard>
          </DCSection>

          <DCSection id="states" title="03 · 状态屏" subtitle="点击「运行智能清理」→ 清理中过渡 → 完成。前后衔接的状态流。">
            <DCArtboard id="empty"    label="空状态 · 首次启动"        width={W} height={H}>
              <HiFiEmpty />
            </DCArtboard>
            <DCArtboard id="loading"  label="加载中 · 扫描中"           width={W} height={H}>
              <HiFiLoading />
            </DCArtboard>
            <DCArtboard id="cleaning" label="清理中 · 过渡动画 ✨"       width={W} height={H}>
              <HiFiCleaning />
            </DCArtboard>
            <DCArtboard id="success"  label="成功 · 清理完成"           width={W} height={H}>
              <HiFiSuccess />
            </DCArtboard>
            <DCArtboard id="error"    label="错误 · 需要权限"           width={W} height={H}>
              <HiFiError />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
